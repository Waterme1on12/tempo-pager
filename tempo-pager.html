<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>节拍翻谱 · Tempo Pager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#121317;
    --panel:#1b1d24;
    --panel-2:#23262e;
    --line:#33363f;
    --brass:#d99b53;
    --brass-bright:#f2b876;
    --ink:#f3efe6;
    --ink-dim:#94969f;
    --ink-faint:#5b5d66;
    --radius:14px;
    --shadow:0 18px 50px rgba(0,0,0,.5);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit;}
  input{font-family:inherit;}
  :focus-visible{outline:2px solid var(--brass-bright); outline-offset:2px;}

  .screen{position:fixed; inset:0; display:flex;}
  .screen[hidden]{display:none;}

  /* ---------- Setup screen ---------- */
  #setup-screen{
    align-items:flex-start;
    justify-content:center;
    overflow-y:auto;
    padding:48px 20px 80px;
    background:
      radial-gradient(ellipse 900px 500px at 50% -10%, rgba(217,155,83,.10), transparent 60%),
      var(--bg);
  }
  .setup-card{width:100%; max-width:560px;}
  .eyebrow{
    font-family:'Space Mono',monospace;
    font-size:12px;
    letter-spacing:.16em;
    color:var(--brass);
    text-transform:uppercase;
    margin:0 0 14px;
  }
  .setup-card h1{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:clamp(28px,5vw,38px);
    line-height:1.15;
    margin:0 0 12px;
  }
  .setup-card .sub{
    color:var(--ink-dim);
    font-size:15px;
    line-height:1.6;
    margin:0 0 32px;
    max-width:46ch;
  }

  .drop-zone{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:10px;
    border:1.5px dashed var(--line);
    border-radius:var(--radius);
    padding:36px 20px;
    cursor:pointer;
    transition:border-color .15s ease, background .15s ease;
    background:var(--panel);
  }
  .drop-zone:hover, .drop-zone.drag-over{border-color:var(--brass); background:var(--panel-2);}
  .drop-zone svg{width:30px; height:30px; stroke:var(--brass); flex-shrink:0;}
  .drop-title{font-weight:600; font-size:15px;}
  .drop-sub{font-size:13px; color:var(--ink-faint); font-family:'Space Mono',monospace;}

  .setup-fields{margin-top:28px; display:flex; flex-direction:column; gap:22px;}
  .field label{display:block; font-size:13px; font-weight:600; color:var(--ink-dim); margin-bottom:8px;}
  .field .hint{font-size:12.5px; color:var(--ink-faint); margin:8px 0 0; line-height:1.5;}

  .stepper{display:flex; align-items:stretch; border:1px solid var(--line); border-radius:10px; overflow:hidden; background:var(--panel);}
  .stepper button{
    width:42px; border:none; background:var(--panel-2); color:var(--ink); font-size:18px; cursor:pointer;
  }
  .stepper button:hover{background:#2c2f39;}
  .stepper input{
    flex:1; min-width:0; text-align:center; border:none; background:transparent; color:var(--ink);
    font-family:'Space Mono',monospace; font-size:18px; padding:10px 0;
  }
  .stepper input:focus{outline:none;}

  input[type="number"].plain-input{
    width:100%; padding:11px 12px; border-radius:10px; border:1px solid var(--line);
    background:var(--panel); color:var(--ink); font-family:'Space Mono',monospace; font-size:16px;
  }

  .field.readout{
    display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap;
    background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:12px 14px;
    font-family:'Space Mono',monospace; font-size:13px; color:var(--brass-bright);
  }

  .toggles{display:flex; gap:20px; flex-wrap:wrap;}
  .toggle{display:flex; align-items:center; gap:9px; cursor:pointer; font-size:14px; color:var(--ink);}
  .toggle input{accent-color:var(--brass); width:17px; height:17px;}

  .seg-control{display:flex; border:1px solid var(--line); border-radius:10px; overflow:hidden;}
  .seg-control button{
    flex:1; padding:11px 8px; border:none; background:var(--panel); color:var(--ink-dim);
    font-size:13.5px; font-weight:600; cursor:pointer; transition:background .15s ease, color .15s ease;
  }
  .seg-control button + button{border-left:1px solid var(--line);}
  .seg-control button.active{background:var(--brass); color:#1a1106;}

  .primary-btn{
    margin-top:6px;
    width:100%; padding:15px; border:none; border-radius:12px;
    background:var(--brass); color:#1a1106; font-weight:700; font-size:15.5px;
    cursor:pointer; transition:background .15s ease, opacity .15s ease, transform .1s ease;
  }
  .primary-btn:hover:not(:disabled){background:var(--brass-bright);}
  .primary-btn:active:not(:disabled){transform:scale(.99);}
  .primary-btn:disabled{opacity:.35; cursor:not-allowed;}

  /* ---------- Player screen ---------- */
  #player-screen{flex-direction:column; background:var(--bg);}

  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    height:46px; flex-shrink:0; padding:0 8px;
    background:var(--panel); border-bottom:1px solid var(--line);
    font-family:'Space Mono',monospace; font-size:13px; color:var(--ink-dim);
  }
  .icon-btn{
    width:36px; height:36px; border:none; background:transparent; color:var(--ink-dim);
    font-size:18px; cursor:pointer; border-radius:8px;
  }
  .icon-btn:hover{background:var(--panel-2); color:var(--ink);}

  .stage{position:relative; flex:1; min-height:0;}
  .stage.mode-jump{overflow:hidden;}
  .stage.mode-scroll{overflow-y:auto;}
  .stage-jump{width:100%; height:100%; display:flex; align-items:center; justify-content:center; padding:16px; }
  .stage-jump canvas{max-width:100%; max-height:100%; box-shadow:var(--shadow); border-radius:3px;}
  .stage-scroll{display:flex; flex-direction:column; align-items:center; gap:26px; padding:26px 0;}
  .stage-scroll canvas{box-shadow:var(--shadow); border-radius:3px; max-width:calc(100% - 32px);}

  .flash-overlay{
    position:absolute; inset:0; pointer-events:none;
    box-shadow:inset 0 0 0 0 rgba(242,184,118,0);
    transition:box-shadow .22s ease-out;
  }
  .flash-overlay.flash-active{box-shadow:inset 0 0 0 6px rgba(242,184,118,.5); transition:none;}
  .flash-overlay.flash-accent.flash-active{box-shadow:inset 0 0 0 10px rgba(242,184,118,.78); transition:none;}

  .loading-overlay{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    background:rgba(18,19,23,.86); color:var(--ink-dim); font-size:14px;
    font-family:'Space Mono',monospace; gap:10px; z-index:5;
  }
  .loading-overlay[hidden]{display:none;}
  .spinner{
    width:16px; height:16px; border-radius:50%;
    border:2px solid var(--line); border-top-color:var(--brass);
    animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  .dock{
    flex-shrink:0; background:rgba(27,29,36,.96); backdrop-filter:blur(6px);
    border-top:1px solid var(--line);
    padding:10px 12px calc(10px + env(safe-area-inset-bottom));
    display:flex; flex-direction:column; gap:10px;
  }
  .dock-row{display:flex; align-items:center; gap:10px; justify-content:center;}

  .dock-btn{
    height:40px; min-width:40px; padding:0 12px; border-radius:10px; border:1px solid var(--line);
    background:var(--panel-2); color:var(--ink); font-size:16px; cursor:pointer;
  }
  .dock-btn:hover{border-color:var(--brass);}
  .dock-btn.small{font-size:12.5px; font-family:'Space Mono',monospace; color:var(--ink-dim);}

  .bpm-display{
    display:flex; align-items:center; gap:10px;
    border:1px solid var(--line); border-radius:10px; background:var(--panel-2); padding:4px 6px;
  }
  .bpm-step{
    width:30px; height:30px; border:none; background:transparent; color:var(--ink-dim);
    font-size:16px; cursor:pointer; border-radius:7px;
  }
  .bpm-step:hover{background:#2c2f39; color:var(--ink);}
  #bpm-readout{
    font-family:'Space Mono',monospace; font-weight:700; font-size:19px; width:50px; text-align:center;
    color:var(--brass-bright); background:transparent; border:none; -moz-appearance:textfield;
  }
  #bpm-readout::-webkit-outer-spin-button,#bpm-readout::-webkit-inner-spin-button{-webkit-appearance:none; margin:0;}
  #bpm-readout:focus{outline:none; background:rgba(255,255,255,.08); border-radius:6px;}
  .bpm-unit{font-size:10px; color:var(--ink-faint); margin-left:-4px;}

  .pendulum-box{width:46px; height:42px; flex-shrink:0;}
  #pendulum{width:100%; height:100%; overflow:visible;}
  #pendulum-arm{transform-origin:30px 50px; transform:rotate(0deg);}

  .dock-toggles{display:flex; gap:6px;}
  .toggle-btn{
    width:38px; height:38px; border-radius:10px; border:1px solid var(--line);
    background:var(--panel-2); color:var(--ink-faint); font-size:15px; cursor:pointer;
  }
  .toggle-btn.active{background:rgba(217,155,83,.16); border-color:var(--brass); color:var(--brass-bright);}

  .transport{gap:10px;}
  .play-btn{
    width:54px; height:54px; border-radius:50%; border:none;
    background:var(--brass); color:#1a1106; font-size:19px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 0 0 0 rgba(217,155,83,0); transition:box-shadow .25s ease;
  }
  .play-btn:hover{background:var(--brass-bright);}
  .play-btn.is-playing{box-shadow:0 0 0 6px rgba(217,155,83,.18);}

  .mode-toggle{display:flex; border:1px solid var(--line); border-radius:10px; overflow:hidden; margin-left:6px;}
  .mode-btn{
    padding:0 12px; height:40px; border:none; background:var(--panel-2); color:var(--ink-dim);
    font-size:12.5px; font-weight:600; cursor:pointer;
  }
  .mode-btn + .mode-btn{border-left:1px solid var(--line);}
  .mode-btn.active{background:var(--brass); color:#1a1106;}

  @media (max-width:480px){
    .dock-btn.small{display:none;}
    .pendulum-box{width:36px;}
  }
</style>
</head>
<body>

<div id="app">

  <!-- ===================== Setup screen ===================== -->
  <section id="setup-screen" class="screen">
    <div class="setup-card">
      <p class="eyebrow">节拍翻谱 · Tempo Pager</p>
      <h1>把翻谱交给节拍器</h1>
      <p class="sub">上传 PDF 乐谱，设好曲速和小节数，开始后乐谱按拍子自动翻页或滚动，双手留给乐器。</p>

      <label id="drop-zone" class="drop-zone" for="file-input">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4M12 4l-4 4M12 4l4 4"/><path d="M4 16v3a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-3"/></svg>
        <span class="drop-title">点击或拖入 PDF 乐谱</span>
        <span class="drop-sub" id="drop-filename">未选择文件</span>
      </label>
      <input type="file" id="file-input" accept="application/pdf" hidden>

      <div class="setup-fields" id="setup-fields" hidden>

        <div class="field">
          <label for="bpm-input">曲速 BPM</label>
          <div class="stepper">
            <button type="button" data-step="-1" aria-label="减速">−</button>
            <input type="number" id="bpm-input" value="90" min="20" max="300">
            <button type="button" data-step="1" aria-label="加速">+</button>
          </div>
        </div>

        <div class="field">
          <label for="beats-per-measure-input">拍号分子（每小节几拍）</label>
          <input type="number" class="plain-input" id="beats-per-measure-input" value="4" min="1" max="16">
        </div>

        <div class="field">
          <label for="total-measures-input">全曲总小节数</label>
          <input type="number" class="plain-input" id="total-measures-input" min="1" placeholder="例如 64">
          <p class="hint">数一下乐谱总共多少小节（不确定就估个整数），会按总拍数自动平均分配到每一页，越准翻页越合拍。</p>
        </div>

        <div class="field readout">
          <span id="page-count-readout">共 0 页</span>
          <span id="beats-per-page-readout">每页约 0 拍</span>
        </div>

        <div class="field">
          <label>翻页方式（开始后仍可随时切换）</label>
          <div class="seg-control" id="setup-mode-seg">
            <button type="button" data-mode="jump" class="active">整页跳转</button>
            <button type="button" data-mode="scroll">连续滚动</button>
          </div>
        </div>

        <div class="field toggles">
          <label class="toggle"><input type="checkbox" id="sound-toggle" checked><span>节拍声音</span></label>
          <label class="toggle"><input type="checkbox" id="visual-toggle" checked><span>视觉提示</span></label>
          <label class="toggle"><input type="checkbox" id="countin-toggle" checked><span>起拍前预备一小节</span></label>
        </div>

        <button id="start-btn" class="primary-btn" disabled>开始演奏</button>
      </div>
    </div>
  </section>

  <!-- ===================== Player screen ===================== -->
  <section id="player-screen" class="screen" hidden>
    <header class="topbar">
      <button id="back-btn" class="icon-btn" title="返回设置">‹</button>
      <span id="counter-readout">1 / 1</span>
      <div style="display:flex;gap:2px">
        <button id="refit-btn" class="icon-btn" title="重新适配窗口大小">⤢</button>
        <button id="fullscreen-btn" class="icon-btn" title="全屏">⛶</button>
      </div>
    </header>

    <div id="stage" class="stage mode-jump">
      <div id="stage-jump" class="stage-jump"><canvas id="jump-canvas"></canvas></div>
      <div id="stage-scroll" class="stage-scroll" hidden></div>
      <div id="flash-overlay" class="flash-overlay"></div>
      <div id="loading-overlay" class="loading-overlay" hidden><span class="spinner"></span><span id="loading-text">正在渲染…</span></div>
    </div>

    <div class="dock">
      <div class="dock-row">
        <button id="tap-btn" class="dock-btn small">点击测速</button>
        <div class="bpm-display">
          <button class="bpm-step" data-step="-1" aria-label="减速">−</button>
          <input type="number" id="bpm-readout" value="90" min="20" max="300">
          <span class="bpm-unit">BPM</span>
          <button class="bpm-step" data-step="1" aria-label="加速">+</button>
        </div>
        <div class="pendulum-box">
          <svg id="pendulum" viewBox="0 0 60 56">
            <line x1="6" y1="50" x2="54" y2="50" stroke="#33363f" stroke-width="2" stroke-linecap="round"/>
            <g id="pendulum-arm">
              <line x1="30" y1="50" x2="30" y2="12" stroke="#d99b53" stroke-width="2.4" stroke-linecap="round"/>
              <circle cx="30" cy="22" r="4" fill="#f2b876"/>
            </g>
          </svg>
        </div>
        <div class="dock-toggles">
          <button id="sound-toggle-btn" class="toggle-btn active" title="节拍声音">♪</button>
          <button id="visual-toggle-btn" class="toggle-btn active" title="视觉提示">◎</button>
        </div>
      </div>
      <div class="dock-row transport">
        <button id="prev-btn" class="dock-btn" title="上一页">‹</button>
        <button id="play-btn" class="play-btn" title="播放/暂停">▶</button>
        <button id="stop-btn" class="dock-btn" title="停止并回到开头">■</button>
        <button id="restart-btn" class="dock-btn small" title="从头开始">⏮ 从头</button>
        <button id="next-btn" class="dock-btn" title="下一页">›</button>
        <div class="mode-toggle">
          <button data-mode="jump" class="mode-btn active">整页</button>
          <button data-mode="scroll" class="mode-btn">滚动</button>
        </div>
      </div>
    </div>
  </section>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

/* ---------------------------------------------------------------- *
 *  DOM references
 * ---------------------------------------------------------------- */
const setupScreen = document.getElementById('setup-screen');
const playerScreen = document.getElementById('player-screen');

const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const dropFilename = document.getElementById('drop-filename');
const setupFields = document.getElementById('setup-fields');

const bpmInput = document.getElementById('bpm-input');
const beatsPerMeasureInput = document.getElementById('beats-per-measure-input');
const totalMeasuresInput = document.getElementById('total-measures-input');
const pageCountReadout = document.getElementById('page-count-readout');
const beatsPerPageReadout = document.getElementById('beats-per-page-readout');
const setupModeSeg = document.getElementById('setup-mode-seg');
const soundToggle = document.getElementById('sound-toggle');
const visualToggle = document.getElementById('visual-toggle');
const countinToggle = document.getElementById('countin-toggle');
const startBtn = document.getElementById('start-btn');

const backBtn = document.getElementById('back-btn');
const refitBtn = document.getElementById('refit-btn');
const counterReadout = document.getElementById('counter-readout');

const stage = document.getElementById('stage');
const stageJumpEl = document.getElementById('stage-jump');
const stageScrollEl = document.getElementById('stage-scroll');
const jumpCanvas = document.getElementById('jump-canvas');
const scrollWrapEl = document.getElementById('stage-scroll');
const flashOverlay = document.getElementById('flash-overlay');
const loadingOverlay = document.getElementById('loading-overlay');
const loadingText = document.getElementById('loading-text');

const tapBtn = document.getElementById('tap-btn');
const bpmReadout = document.getElementById('bpm-readout');
const bpmStepBtns = document.querySelectorAll('.bpm-display .bpm-step');
const pendulumArm = document.getElementById('pendulum-arm');
const soundToggleBtn = document.getElementById('sound-toggle-btn');
const visualToggleBtn = document.getElementById('visual-toggle-btn');

const prevBtn = document.getElementById('prev-btn');
const playBtn = document.getElementById('play-btn');
const stopBtn = document.getElementById('stop-btn');
const nextBtn = document.getElementById('next-btn');
const modeBtns = document.querySelectorAll('.mode-btn');

/* ---------------------------------------------------------------- *
 *  State
 * ---------------------------------------------------------------- */
let pdfDoc = null;
let numPages = 0;
let setupSelectedMode = 'jump';

const state = {
  bpm: 90,
  beatsPerMeasure: 4,
  totalMeasures: 0,
  totalBeats: 0,
  beatsPerPage: 0,
  soundOn: true,
  visualOn: true,
  countInOn: true,
  mode: 'jump'
};

let audioCtx = null;
let isPlaying = false;
let playStartAudioTime = 0;
let elapsedBeatsAtStart = 0;
let nextClickBeatIndex = 0;
let schedulerId = null;
let rafId = null;

const LOOKAHEAD = 0.12;     // seconds
const SCHEDULE_INTERVAL = 25; // ms
const PENDULUM_MAX_ANGLE = 24; // degrees

let currentPageDisplayed = -1;
let currentRenderTask = null;
let scrollRendered = false;
let tapTimes = [];

/* ---------------------------------------------------------------- *
 *  Helpers
 * ---------------------------------------------------------------- */
function clampNum(v, min, max){ return Math.min(max, Math.max(min, v)); }

function recomputeBeatsPerPage(){
  const bpMeasure = parseInt(beatsPerMeasureInput.value) || 4;
  const totalMeasures = parseInt(totalMeasuresInput.value) || 0;
  const totalBeats = bpMeasure * totalMeasures;
  const perPage = numPages ? totalBeats / numPages : 0;
  beatsPerPageReadout.textContent = `每页约 ${perPage.toFixed(1)} 拍`;
  startBtn.disabled = !(pdfDoc && totalMeasures >= 1 && bpMeasure >= 1);
}

function showLoading(msg){
  loadingText.textContent = msg;
  loadingOverlay.hidden = false;
}
function hideLoading(){ loadingOverlay.hidden = true; }

/* ---------------------------------------------------------------- *
 *  PDF loading (setup screen)
 * ---------------------------------------------------------------- */
async function loadPdfFile(file){
  dropFilename.textContent = file.name;
  const buf = await file.arrayBuffer();
  pdfDoc = await pdfjsLib.getDocument({ data: buf }).promise;
  numPages = pdfDoc.numPages;
  pageCountReadout.textContent = `共 ${numPages} 页`;
  if(!totalMeasuresInput.value){
    totalMeasuresInput.value = numPages * 8;
  }
  scrollRendered = false;
  currentPageDisplayed = -1;
  setupFields.hidden = false;
  recomputeBeatsPerPage();
}

dropZone.addEventListener('click', (e)=>{ /* native label->input click already opens picker */ });
fileInput.addEventListener('change', (e)=>{
  const f = e.target.files[0];
  if(f) loadPdfFile(f);
});
['dragover','dragenter'].forEach(evt=>{
  dropZone.addEventListener(evt, (e)=>{ e.preventDefault(); dropZone.classList.add('drag-over'); });
});
['dragleave','dragend'].forEach(evt=>{
  dropZone.addEventListener(evt, (e)=>{ dropZone.classList.remove('drag-over'); });
});
dropZone.addEventListener('drop', (e)=>{
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const f = e.dataTransfer.files && e.dataTransfer.files[0];
  if(f && f.type === 'application/pdf') loadPdfFile(f);
});

[beatsPerMeasureInput, totalMeasuresInput].forEach(el=>{
  el.addEventListener('input', recomputeBeatsPerPage);
});

setupModeSeg.addEventListener('click', (e)=>{
  const btn = e.target.closest('button[data-mode]');
  if(!btn) return;
  setupSelectedMode = btn.dataset.mode;
  setupModeSeg.querySelectorAll('button').forEach(b=> b.classList.toggle('active', b===btn));
});

bpmInput.parentElement.querySelectorAll('button[data-step]').forEach(b=>{
  b.addEventListener('click', ()=>{
    const v = clampNum((parseInt(bpmInput.value)||90) + parseInt(b.dataset.step), 20, 300);
    bpmInput.value = v;
  });
});

/* ---------------------------------------------------------------- *
 *  Start playback session
 * ---------------------------------------------------------------- */
startBtn.addEventListener('click', async ()=>{
  state.bpm = clampNum(parseInt(bpmInput.value) || 90, 20, 300);
  state.beatsPerMeasure = parseInt(beatsPerMeasureInput.value) || 4;
  state.totalMeasures = parseInt(totalMeasuresInput.value) || numPages * 8;
  state.totalBeats = state.beatsPerMeasure * state.totalMeasures;
  state.beatsPerPage = state.totalBeats / numPages;
  state.soundOn = soundToggle.checked;
  state.visualOn = visualToggle.checked;
  state.countInOn = countinToggle.checked;

  bpmReadout.value = state.bpm;
  soundToggleBtn.classList.toggle('active', state.soundOn);
  visualToggleBtn.classList.toggle('active', state.visualOn);

  elapsedBeatsAtStart = 0;
  isPlaying = false;
  currentPageDisplayed = -1;

  setupScreen.hidden = true;
  playerScreen.hidden = false;

  await setMode(setupSelectedMode);
  // Ensure page 1 is visible immediately (jump mode renders on first updateVisualPosition,
  // but scroll mode needs no extra work — renderAllContinuous already populated the list)
  if(setupSelectedMode === 'jump' && currentPageDisplayed !== 1){
    currentPageDisplayed = 1;
    await renderPageJump(1);
  }
  updateTransportUI();
});

backBtn.addEventListener('click', ()=>{
  if(isPlaying) doPause();
  playerScreen.hidden = true;
  setupScreen.hidden = false;
});

/* ---------------------------------------------------------------- *
 *  Rendering
 * ---------------------------------------------------------------- */
async function renderPageJump(pageNum){
  if(!pdfDoc) return;
  pageNum = clampNum(pageNum, 1, numPages);
  const page = await pdfDoc.getPage(pageNum);
  const containerW = Math.max(stage.clientWidth - 32, 100);
  const containerH = Math.max(stage.clientHeight - 32, 100);
  const base = page.getViewport({ scale: 1 });
  const scale = Math.max(Math.min(containerW / base.width, containerH / base.height), 0.1);
  const viewport = page.getViewport({ scale });
  const outputScale = Math.min(window.devicePixelRatio || 1, 2);

  jumpCanvas.width = Math.floor(viewport.width * outputScale);
  jumpCanvas.height = Math.floor(viewport.height * outputScale);
  jumpCanvas.style.width = viewport.width + 'px';
  jumpCanvas.style.height = viewport.height + 'px';

  const ctx = jumpCanvas.getContext('2d');
  ctx.setTransform(outputScale, 0, 0, outputScale, 0, 0);

  if(currentRenderTask){
    try{ currentRenderTask.cancel(); }catch(e){}
  }
  const task = page.render({ canvasContext: ctx, viewport });
  currentRenderTask = task;
  try{
    await task.promise;
  }catch(err){
    if(!err || err.name !== 'RenderingCancelledException') throw err;
  }finally{
    if(currentRenderTask === task) currentRenderTask = null;
  }
}

async function renderAllContinuous(){
  if(!pdfDoc) return;
  scrollWrapEl.innerHTML = '';
  const containerW = Math.max(stage.clientWidth - 32, 100);
  const outputScale = Math.min(window.devicePixelRatio || 1, 2);
  for(let i = 1; i <= numPages; i++){
    const page = await pdfDoc.getPage(i);
    const base = page.getViewport({ scale: 1 });
    const scale = containerW / base.width;
    const viewport = page.getViewport({ scale });
    const canvas = document.createElement('canvas');
    canvas.width = Math.floor(viewport.width * outputScale);
    canvas.height = Math.floor(viewport.height * outputScale);
    canvas.style.width = viewport.width + 'px';
    canvas.style.height = viewport.height + 'px';
    const ctx = canvas.getContext('2d');
    ctx.setTransform(outputScale, 0, 0, outputScale, 0, 0);
    await page.render({ canvasContext: ctx, viewport }).promise;
    scrollWrapEl.appendChild(canvas);
  }
}

async function setMode(mode){
  state.mode = mode;
  stage.className = 'stage ' + (mode === 'jump' ? 'mode-jump' : 'mode-scroll');
  stageJumpEl.hidden = mode !== 'jump';
  stageScrollEl.hidden = mode !== 'scroll';
  modeBtns.forEach(b => b.classList.toggle('active', b.dataset.mode === mode));

  if(mode === 'scroll' && !scrollRendered){
    showLoading('正在渲染整份乐谱…');
    await renderAllContinuous();
    scrollRendered = true;
    hideLoading();
  }
  currentPageDisplayed = -1;
  updateVisualPosition(true);
}

refitBtn.addEventListener('click', async ()=>{
  if(state.mode === 'scroll'){
    showLoading('正在重新适配…');
    scrollRendered = false;
    await renderAllContinuous();
    scrollRendered = true;
    hideLoading();
  }
  currentPageDisplayed = -1;
  updateVisualPosition(true);
});

modeBtns.forEach(b=>{
  b.addEventListener('click', ()=> setMode(b.dataset.mode));
});

let resizeTimer;
window.addEventListener('resize', ()=>{
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(()=>{
    if(playerScreen.hidden) return;
    if(state.mode === 'jump') updateVisualPosition(true);
  }, 150);
});

/* ---------------------------------------------------------------- *
 *  Clock / scheduler
 * ---------------------------------------------------------------- */
function secPerBeat(){ return 60 / state.bpm; }

function currentElapsedBeats(){
  if(!isPlaying) return elapsedBeatsAtStart;
  return elapsedBeatsAtStart + (audioCtx.currentTime - playStartAudioTime) / secPerBeat();
}

function ensureAudioCtx(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if(audioCtx.state === 'suspended') audioCtx.resume();
}

function scheduleClick(time, accent){
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.frequency.value = accent ? 1500 : 1000;
  gain.gain.setValueAtTime(0.0001, time);
  gain.gain.exponentialRampToValueAtTime(accent ? 0.5 : 0.28, time + 0.001);
  gain.gain.exponentialRampToValueAtTime(0.0001, time + 0.05);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(time);
  osc.stop(time + 0.06);
}

function scheduleFlash(time, accent){
  const delayMs = Math.max(0, (time - audioCtx.currentTime) * 1000);
  setTimeout(()=> triggerFlash(accent), delayMs);
}

function triggerFlash(accent){
  flashOverlay.classList.remove('flash-active', 'flash-accent');
  void flashOverlay.offsetWidth;
  flashOverlay.classList.add('flash-active');
  if(accent) flashOverlay.classList.add('flash-accent');
  setTimeout(()=>{
    flashOverlay.classList.remove('flash-active', 'flash-accent');
  }, 90);
}

function startScheduler(){
  schedulerId = setInterval(()=>{
    while(true){
      const beatTime = playStartAudioTime + (nextClickBeatIndex - elapsedBeatsAtStart) * secPerBeat();
      if(beatTime < audioCtx.currentTime + LOOKAHEAD){
        const isDownbeat = ((nextClickBeatIndex % state.beatsPerMeasure) + state.beatsPerMeasure) % state.beatsPerMeasure === 0;
        if(state.soundOn) scheduleClick(beatTime, isDownbeat);
        if(state.visualOn) scheduleFlash(beatTime, isDownbeat);
        nextClickBeatIndex++;
      } else {
        break;
      }
    }
  }, SCHEDULE_INTERVAL);
}
function stopScheduler(){ if(schedulerId){ clearInterval(schedulerId); schedulerId = null; } }

function startRAF(){
  function frame(){
    updateVisualPosition(false);
    rafId = requestAnimationFrame(frame);
  }
  rafId = requestAnimationFrame(frame);
}
function stopRAF(){ if(rafId){ cancelAnimationFrame(rafId); rafId = null; } }

/* ---------------------------------------------------------------- *
 *  Visual position update (page index / scroll / pendulum)
 * ---------------------------------------------------------------- */
function updateVisualPosition(force){
  const eb = currentElapsedBeats();
  const totalBeats = state.totalBeats || 1;
  const ebPos = Math.max(0, eb);
  const ebClamped = Math.min(ebPos, totalBeats);
  const progress = totalBeats ? ebClamped / totalBeats : 0;

  const angle = (isPlaying || force) ? Math.sin(eb * Math.PI) * PENDULUM_MAX_ANGLE : 0;
  pendulumArm.style.transform = `rotate(${angle}deg)`;

  const pageIdx = clampNum(Math.floor(ebClamped / (state.beatsPerPage || 1)) + 1, 1, numPages || 1);

  if(state.mode === 'scroll'){
    const maxScroll = stage.scrollHeight - stage.clientHeight;
    programmaticScroll = true;
    stage.scrollTop = maxScroll > 0 ? progress * maxScroll : 0;
    requestAnimationFrame(()=>{ programmaticScroll = false; });
    counterReadout.textContent = `${pageIdx} / ${numPages} (${Math.round(progress * 100)}%)`;
  } else {
    if(pageIdx !== currentPageDisplayed || force){
      currentPageDisplayed = pageIdx;
      renderPageJump(pageIdx).catch(()=>{});
    }
    counterReadout.textContent = `${pageIdx} / ${numPages}`;
  }

  if(eb >= totalBeats && isPlaying){
    elapsedBeatsAtStart = totalBeats;
    isPlaying = false;
    stopScheduler();
    stopRAF();
    updateTransportUI();
  }
}

/* ---------------------------------------------------------------- *
 *  Transport controls
 * ---------------------------------------------------------------- */
function doPlay(){
  ensureAudioCtx();
  if(elapsedBeatsAtStart === 0 && state.countInOn){
    elapsedBeatsAtStart = -state.beatsPerMeasure;
  }
  playStartAudioTime = audioCtx.currentTime;
  isPlaying = true;
  nextClickBeatIndex = Math.ceil(elapsedBeatsAtStart - 1e-9);
  startScheduler();
  startRAF();
  updateTransportUI();
}

function doPause(){
  elapsedBeatsAtStart = Math.max(0, currentElapsedBeats());
  isPlaying = false;
  stopScheduler();
  stopRAF();
  updateTransportUI();
}

function doStop(){
  if(isPlaying){ isPlaying = false; stopScheduler(); stopRAF(); }
  elapsedBeatsAtStart = 0;
  updateVisualPosition(true);
  updateTransportUI();
}

function nudge(delta){
  let eb = currentElapsedBeats();
  if(state.mode === 'jump'){
    const targetPage = clampNum(currentPageDisplayed + delta, 1, numPages);
    eb = (targetPage - 1) * state.beatsPerPage;
  } else {
    eb = clampNum(eb + delta * state.beatsPerPage, 0, state.totalBeats);
  }
  elapsedBeatsAtStart = eb;
  if(isPlaying) playStartAudioTime = audioCtx.currentTime;
  nextClickBeatIndex = Math.ceil(elapsedBeatsAtStart - 1e-9);
  updateVisualPosition(true);
}

function updateTransportUI(){
  playBtn.textContent = isPlaying ? '❚❚' : '▶';
  playBtn.classList.toggle('is-playing', isPlaying);
}

function setBpm(newBpm){
  newBpm = clampNum(Math.round(newBpm), 20, 300);
  const eb = currentElapsedBeats();
  elapsedBeatsAtStart = eb;
  state.bpm = newBpm;
  bpmReadout.value = newBpm;
  if(isPlaying){
    playStartAudioTime = audioCtx.currentTime;
    nextClickBeatIndex = Math.ceil(elapsedBeatsAtStart - 1e-9);
  }
}

playBtn.addEventListener('click', ()=>{ isPlaying ? doPause() : doPlay(); });
stopBtn.addEventListener('click', doPause);   // stop = pause in place
nextBtn.addEventListener('click', ()=> nudge(1));
prevBtn.addEventListener('click', ()=> nudge(-1));

document.getElementById('restart-btn').addEventListener('click', ()=>{
  if(isPlaying){ isPlaying = false; stopScheduler(); stopRAF(); }
  elapsedBeatsAtStart = 0;
  currentPageDisplayed = -1;
  updateVisualPosition(true);
  updateTransportUI();
});

/* Sync scroll position -> beat position while paused (scroll mode) */
let scrollSyncTimer = null;
let programmaticScroll = false;
stage.addEventListener('scroll', ()=>{
  if(state.mode !== 'scroll' || isPlaying || programmaticScroll) return;
  clearTimeout(scrollSyncTimer);
  scrollSyncTimer = setTimeout(()=>{
    const maxScroll = Math.max(1, stage.scrollHeight - stage.clientHeight);
    const progress = stage.scrollTop / maxScroll;
    elapsedBeatsAtStart = clampNum(progress * state.totalBeats, 0, state.totalBeats);
    nextClickBeatIndex = Math.ceil(elapsedBeatsAtStart - 1e-9);
    // update counter without moving scroll
    const pageIdx = clampNum(Math.floor(elapsedBeatsAtStart / (state.beatsPerPage || 1)) + 1, 1, numPages || 1);
    counterReadout.textContent = `${pageIdx} / ${numPages} (${Math.round(progress * 100)}%)`;
  }, 80);
});

bpmStepBtns.forEach(b=>{
  b.addEventListener('click', ()=> setBpm(state.bpm + parseInt(b.dataset.step)));
});

/* direct BPM input editing */
bpmReadout.addEventListener('change', ()=> setBpm(parseInt(bpmReadout.value) || state.bpm));
bpmReadout.addEventListener('keydown', (e)=>{ if(e.key==='Enter') bpmReadout.blur(); });

/* fullscreen */
const fullscreenBtn = document.getElementById('fullscreen-btn');
function isFS(){ return !!(document.fullscreenElement || document.webkitFullscreenElement); }
function updateFsBtn(){ fullscreenBtn.textContent = isFS() ? '⤓' : '⛶'; }
fullscreenBtn.addEventListener('click', ()=>{
  if(isFS()){
    (document.exitFullscreen || document.webkitExitFullscreen).call(document);
  } else {
    const el = document.documentElement;
    (el.requestFullscreen || el.webkitRequestFullscreen).call(el).catch(()=>{});
  }
});
document.addEventListener('fullscreenchange', updateFsBtn);
document.addEventListener('webkitfullscreenchange', updateFsBtn);

tapBtn.addEventListener('click', ()=>{
  const now = performance.now();
  if(tapTimes.length && now - tapTimes[tapTimes.length - 1] > 2000) tapTimes = [];
  tapTimes.push(now);
  if(tapTimes.length > 8) tapTimes.shift();
  if(tapTimes.length > 1){
    const intervals = [];
    for(let i = 1; i < tapTimes.length; i++) intervals.push(tapTimes[i] - tapTimes[i - 1]);
    const avg = intervals.reduce((a, b)=> a + b, 0) / intervals.length;
    const bpm = Math.round(60000 / avg);
    if(bpm >= 20 && bpm <= 300) setBpm(bpm);
  }
});

soundToggleBtn.addEventListener('click', ()=>{
  state.soundOn = !state.soundOn;
  soundToggleBtn.classList.toggle('active', state.soundOn);
});
visualToggleBtn.addEventListener('click', ()=>{
  state.visualOn = !state.visualOn;
  visualToggleBtn.classList.toggle('active', state.visualOn);
});

document.addEventListener('keydown', (e)=>{
  if(playerScreen.hidden) return;
  if(document.activeElement && /input/i.test(document.activeElement.tagName)) return;
  if(e.code === 'Space'){ e.preventDefault(); isPlaying ? doPause() : doPlay(); }
  if(e.code === 'ArrowRight'){ nudge(1); }
  if(e.code === 'ArrowLeft'){ nudge(-1); }
});
</script>
</body>
</html>
